<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>
  <link rel="stylesheet" href="slider.css">
</head>
<body>
  <div class="slider-window" id="sliderWindow">
    <h2 class="slider-title" id="sliderTitle">调整透明度</h2>
    
    <div class="slider-area">
      <div class="slider-label">
        <span class="label-text" id="labelText">不透明度</span>
        <span class="value-text" id="valueText">98%</span>
      </div>
      
      <div class="slider-track" id="sliderTrack">
        <div class="slider-fill" id="sliderFill"></div>
        <div class="slider-thumb" id="sliderThumb"></div>
      </div>
    </div>
    
    <button class="close-btn" id="closeBtn">完成</button>
  </div>

  <script src="slider.js"></script>
</body>
</html>
